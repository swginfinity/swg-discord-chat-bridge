services:
  swg-chatbots:
    build: .
    container_name: swg-chatbots
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs:/app/configs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/chatbridge_alive'); exit(0 if time.time()-s.st_mtime < 120 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
